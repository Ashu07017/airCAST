name: Hourly Air Quality Fetch

on:
  schedule:
    - cron: '0 * * * *'   # runs every hour at :00
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas python-dotenv

      - name: Run fetch script
        run: python src/fetch_data.py

      - name: Commit and push new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/
          git diff --staged --quiet || git commit -m "data: hourly fetch $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push